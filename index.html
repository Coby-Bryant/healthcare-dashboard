<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Healthcare Dashboard</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Healthcare Dashboard</h1>

        <p>Patient Management System</p>

        <div id="page-controls">

            <button
                id="theme-toggle"
                type="button"
            >

                Toggle Theme

            </button>

            <div
                id="page-size-control"
                aria-label="Page size"
            >

                <span class="page-size-label">
                    Page Size
                </span>

                <div
                    class="page-size-options"
                    role="group"
                    aria-label="Page size options"
                >

                    <button
                        type="button"
                        class="page-size-btn"
                        data-page-size="normal"
                        aria-pressed="true"
                    >
                        A
                    </button>

                    <button
                        type="button"
                        class="page-size-btn"
                        data-page-size="large"
                        aria-pressed="false"
                    >
                        A+
                    </button>

                    <button
                        type="button"
                        class="page-size-btn"
                        data-page-size="xlarge"
                        aria-pressed="false"
                    >
                        A++
                    </button>

                </div>

            </div>

        </div>

    </header>

    <section>
        <div id="stats-container">

        </div>  
    </section>

    <section>

        <div id="chart-container">

        </div>

    </section>

    <section>

        <form id="patient-form">
            <input
                type="text"
                id="patient-name"
                placeholder="Patient Name"
                required
            >

            <input
                type="text"
                id="patient-room"
                placeholder="Room"
                required
            >

            <input
                type="text"
                id="patient-diagnosis"
                placeholder="Diagnosis"
                required
            >

            <select 
                id="patient-status"
            >
                <option>Stable</option>
                <option>Observation</option>
                <option>Critical</option>
            </select>

            <button type="submit">
                Add Patient
            </button>
        </form>
    </section>

    <section>

        <div id="analytics-container">

        </div>

    </section>

    <section>
        <input
            type="text"
            id="search-input"
            placeholder="Search patients..."
        >
    </section>

    <section>
        <div id="patients-container">
        
        </div>
    </section>

    <div
        id="patient-modal"
        class="hidden-modal"
    >

        <div class="modal-content"

        >
           <span
                id="close-modal"
            >
                x
            </span>

            <div
                id="modal-details"
            >

            </div>

        </div>
    
    </div>

    <div
    id="edit-modal"
    class="hidden-modal"
    >

        <div
            class="modal-content"
        >

            <span
                id="close-edit-modal"
            >
                x
            </span>

            <h2>
                Edit Patient
            </h2>

            <input
                id="edit-name"
            >

            <input
                id="edit-room"
            >

            <input
                id="edit-diagnosis"
            >

            <select
                id="edit-status"
            >

                <option>
                    Stable
                </option>

                <option>
                    Observation
                </option>

                <option>
                    Critical
                </option>

            </select>

            <button
                id="save-edit-btn"
                onclick="savePatientEdit()"
            >
                Save Changes
            </button>

        </div>

    </div>

    <div id="toast">

    </div>

    <footer>

        Built by Coby Bryant

    </footer>

    <script src="script.js"></script>

</body>

</html>
